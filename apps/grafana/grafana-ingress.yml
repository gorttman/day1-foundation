apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    argocd.argoproj.io/managed-by: argocd
  annotations:
    cert-manager.io/cluster-issuer: "private-ca"
spec:
  # Internal-only: no Cloudflare Tunnel annotation; DNS in dns-conf.
  # Global http->https redirect applies (day0-bootstrap apps/traefik).
  ingressClassName: traefik
  tls:
  - hosts:
    - grafana.i3sec.com.au
    secretName: grafana-tls
  rules:
  - host: grafana.i3sec.com.au
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
