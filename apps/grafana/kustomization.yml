apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# Namespace is owned by the influxdb app (monitoring, part-of:
# observability) - reused here per convention, not redeclared, so two
# Argo apps don't fight over the same Namespace object.
resources:
  - grafana-sealed-secret.yml
  - grafana-pvc.yml
  - grafana-datasource-cm.yml
  - grafana-deployment.yml
  - grafana-service.yml
  - grafana-ingress.yml
