apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: wlan-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.2.240-192.168.2.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: wlan-l2adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - wlan-pool
  # Both nodes name their WLAN interface wlan0 — scope ARP announcements to
  # that interface only, not the wired backend network.
  interfaces:
    - wlan0
