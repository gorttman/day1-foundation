apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qnap-storage
  namespace: argocd
  labels:
    app.kubernetes.io/name: qnap-storage
    app.kubernetes.io/part-of: day1-foundation
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # PVs before the day2 apps that claim them
spec:
  project: default
  source:
    repoURL: https://github.com/gorttman/day1-foundation.git
    targetRevision: main
    path: apps/qnap-storage
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
