# Static NFS PersistentVolume onto a QNAP (valinor-m) share. One PV per
# QNAP directory - see README.md for the pattern and the prerequisites
# (FQDN resolution on every node via day0-infra-build's qnap_client role).
#
# path is a subdirectory of the /vault top-level export (confirmed via
# showmount -e qnap.i3sec.com.au), not a separate export - same pattern as
# /books/library etc.
#
# accessModes is ReadWriteOnce, not ReadWriteMany like every other PV in
# this directory - deliberate. Obsidian is single-replica
# (strategy: Recreate) with no multi-writer use case for a single vault,
# so RWX would just be a wider claim than the workload actually needs.
#
# storageClassName is a deliberate non-provisioned marker class: it
# stops the default local-path provisioner from intercepting claims and
# lets PVCs bind these by class + volumeName.
#
# nfs.server is the literal management-network IP (192.168.1.30), not
# qnap.i3sec.com.au, unlike qnap-books - deliberate, not a copy/paste
# inconsistency. Pi-hole serves that FQDN's WLAN face (192.168.2.30) to
# normal clients; nodes are meant to resolve it to the wired face via a
# per-node /etc/hosts pin (day0-infra-build's qnap_client role). On
# k8smaster that pin is confirmed correct, and NFSv4 trunking papers over
# it in practice regardless (the live TCP session ends up on 192.168.1.30
# even when the recorded mount source shows 192.168.2.30). But this PV's
# consumer (obsidian) runs on pinode-01, a diskless netboot node whose
# /etc/hosts is a separately-synced overlay with no confirmed-live check
# behind it - pinning the IP directly removes the dependency on that
# overlay ever having actually landed.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qnap-vault
  labels:
    app.kubernetes.io/part-of: qnap-storage
    argocd.argoproj.io/managed-by: argocd
spec:
  capacity:
    storage: 10Gi  # informational for NFS; not enforced
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qnap-static
  mountOptions:
    - vers=4
    - noatime
  nfs:
    server: 192.168.1.30
    path: /vault/obsidian
