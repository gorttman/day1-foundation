apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app: cloudflared
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: day1-foundation
    argocd.argoproj.io/managed-by: argocd
spec:
  # 2 replicas per Cloudflare's guidance; each holds its own set of
  # connections to the edge. Spread across nodes (no storage, tiny image,
  # so the pinode tmpfs constraint doesn't apply).
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tunnel
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: cloudflared
      enableServiceLinks: false
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.6.1
        imagePullPolicy: IfNotPresent
        # Token-based tunnel (created via the dashboard) - config is
        # remotely-managed in Cloudflare, no local config.yml here.
        args:
        - tunnel
        - run
        - --token
        - $(TUNNEL_TOKEN)
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN
        ports:
        - name: metrics
          containerPort: 2000
          protocol: TCP
        resources:
          requests:
            memory: "32Mi"
            cpu: "20m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 20
          periodSeconds: 30
          failureThreshold: 3
