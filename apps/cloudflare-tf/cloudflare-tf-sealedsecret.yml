# All four fields sealed for real: TF_BACKEND_PG_CONN_STR (points at the
# cloudflare_tf database on the shared Postgres instance,
# day2-services/apps/postgres), TF_VAR_zone_id, TF_VAR_cloudflare_api_token,
# TF_VAR_allowed_client_cert_fingerprints (JSON array of SHA-256
# fingerprints — see README.md for the device list these map to).
#
# To rotate any one field later without disturbing the others, seal just
# that value with kubeseal --raw (scope strict, namespace infra, name
# cloudflare-tf-secrets) and replace only its line below — kubeseal
# defaults to controller "sealed-secrets-controller" in "kube-system",
# which matches this cluster, so no extra flags are needed.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-tf-secrets
  namespace: infra
spec:
  encryptedData:
    TF_BACKEND_PG_CONN_STR: ""
    TF_VAR_zone_id: ""
    TF_VAR_cloudflare_api_token: ""
    TF_VAR_allowed_client_cert_fingerprints: ""
  template:
    metadata:
      name: cloudflare-tf-secrets
      namespace: infra
    type: Opaque
