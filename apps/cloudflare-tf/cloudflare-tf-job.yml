apiVersion: batch/v1
kind: Job
metadata:
  name: cloudflare-tf-apply
  labels:
    app.kubernetes.io/name: cloudflare-tf
    app.kubernetes.io/part-of: day1-foundation
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-tf
        app.kubernetes.io/part-of: day1-foundation
    spec:
      restartPolicy: Never
      containers:
        - name: terraform
          image: hashicorp/terraform:1.9.8
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              cp -r /workspace-ro/. /workspace/
              cd /workspace
              terraform init -input=false -backend-config="conn_str=${TF_BACKEND_PG_CONN_STR}"
              terraform plan -input=false -out=tfplan
              terraform apply -input=false tfplan
          envFrom:
            - secretRef:
                name: cloudflare-tf-secrets
          volumeMounts:
            - name: tf-config-ro
              mountPath: /workspace-ro
              readOnly: true
            - name: tf-workspace
              mountPath: /workspace
      volumes:
        - name: tf-config-ro
          configMap:
            name: cloudflare-tf-config
        - name: tf-workspace
          # This node's default emptyDir is NFS-backed (local_lock=none),
          # which fails flock() with ENOLCK - Terraform's state locking
          # needs real file locks even with the pg backend. medium: Memory
          # (tmpfs) avoids it; confirmed via a throwaway test pod on the
          # same node. Small sizeLimit since this node is RAM-constrained.
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
